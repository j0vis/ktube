name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Fail-fast OFF: one PHP-version failure shouldn't mask a Node-side failure
# (and vice-versa) in the same matrix sweep.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (node tools/validate.mjs + php -l)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Setup Node 20 (lint pass only — no install needed for validate.mjs)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: node tools/validate.mjs
        run: node tools/validate.mjs

      - name: php -l over includes/
        run: |
          find . -path ./node_modules -prune -o -path ./.git -prune -o -path ./tests -prune -o -name '*.php' -print0 \
            | while IFS= read -r -d '' f; do php -l "$f"; done

  phpunit:
    name: phpunit (composer-free runner)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.2']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: composer-free PHPUnit runner
        run: php tests/phpunit/run.php

  vitest:
    name: vitest (jsdom, node 20)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: npm ci (vitest + jsdom devDeps only)
        run: npm ci --no-audit --no-fund

      - name: vitest run
        run: npm test
